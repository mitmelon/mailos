<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>MailOS</title></head>
<body style="background:#08080a;">
<script>
  fetch('/auth/status', { credentials: 'include' })
    .then((r) => r.json())
    .then((s) => { window.location.replace(s.hasAdminUser ? '/app.html' : '/login.html'); })
    .catch(() => { window.location.replace('/login.html'); });
</script>
</body>
</html>
