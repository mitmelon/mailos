<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MailOS</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="apple-touch-icon" href="/logo.png">
  <style>
    body {
      background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      text-align: center;
      color: #fff;
    }
    .logo {
      width: 80px;
      height: 80px;
      border-radius: 16px;
      margin-bottom: 24px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.9; }
    }
    h1 { font-size: 28px; font-weight: 600; margin: 0 0 8px; }
    .subtitle { color: #8b8ba3; font-size: 14px; margin-bottom: 32px; }
    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid #3b3b5c;
      border-top-color: #5b5bf0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .text-muted { color: #5a5a7a; }
    .version { font-size: 12px; color: #4a4a6a; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/logo.png" alt="MailOS" class="logo">
    <h1>MailOS</h1>
    <p class="subtitle">AI-powered email communication engine</p>
    <div class="spinner" id="spinner"></div>
    <p class="text-muted" id="status" style="margin-top: 16px;">Checking authentication...</p>
    <p class="version">v<span id="version">...</span></p>
  </div>
  <script>
    // Fetch version
    fetch('/system/version', { credentials: 'include' })
      .then(r => r.json())
      .then(data => { document.getElementById('version').textContent = data.version; })
      .catch(() => { document.getElementById('version').textContent = '0.0.0'; });

    // Check auth status and redirect
    fetch('/auth/status', { credentials: 'include' })
      .then(r => r.json())
      .then(s => {
        document.getElementById('status').textContent = 'Redirecting...';
        setTimeout(() => {
          window.location.replace(s.hasAdminUser ? '/app.html' : '/login.html');
        }, 500);
      })
      .catch(() => {
        document.getElementById('status').textContent = 'Connection error. Retrying...';
        setTimeout(() => location.reload(), 2000);
      });
  </script>
</body>
</html>
